<header class="site-header">
  <span class="header-prompt">root@terminal:~#</span>
  <a href="{{ '/' | relative_url }}" class="site-title">{{ site.title }}</a>
  <nav class="site-nav" role="navigation" aria-label="Main navigation">
    <a href="{{ '/' | relative_url }}"{% if page.url == '/' %} class="active"{% endif %}>HOME</a>
    {% if site.author.github %}<a href="https://github.com/{{ site.author.github }}" rel="noopener" target="_blank">GITHUB</a>{% endif %}
  </nav>
</header>
