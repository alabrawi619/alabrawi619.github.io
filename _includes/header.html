<header class="site-header">
  <div class="wrap header-inner">
    <a href="{{ '/' | relative_url }}" class="brand">
      <span class="brand-name glitch" data-text="{{ site.title }}">{{ site.title }}</span>
    </a>
    <nav class="site-nav" aria-label="Main navigation">
      <a href="{{ '/' | relative_url }}"{% if page.url == '/' %} class="active"{% endif %}>Home</a>
      <a href="{{ '/blogs/' | relative_url }}"{% if page.url contains '/blogs' %} class="active"{% endif %}>Blogs</a>
      <a href="{{ '/tags/' | relative_url }}"{% if page.url contains '/tags' %} class="active"{% endif %}>Tags</a>
      {% if site.author.github %}<a href="https://github.com/{{ site.author.github }}" rel="noopener" target="_blank">GitHub</a>{% endif %}
    </nav>
  </div>
</header>
