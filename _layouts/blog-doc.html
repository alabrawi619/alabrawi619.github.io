---
layout: default
---
<div class="blog-doc-layout{% if page.blog_landing %} blog-landing-layout{% endif %}" data-blog-doc>
  {% include blog-sidebar.html %}
  <div class="blog-doc-main">
    <article class="blog-doc-content{% if page.blog_landing %} blog-landing{% endif %} reveal">
      <header class="page-header">
        {% if page.blog_landing %}<span class="page-kicker">// knowledge base</span>{% endif %}
        <h1 class="page-title">{{ page.title }}</h1>
        {% if page.description %}<p class="page-subtitle">{{ page.description }}</p>{% endif %}
      </header>
      <div class="prose">
        {{ content }}
      </div>
    </article>
  </div>
</div>
