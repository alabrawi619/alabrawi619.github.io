# ============================================================
# Site settings — Cyber Dark
# ============================================================
title: "alabrawi619"
description: "A cyber dark corner of the web — notes, experiments, and ideas."
url: "https://alabrawi619.github.io"
baseurl: ""
lang: en

author:
  name: "alabrawi619"
  email: ""
  bio: "Developer & tinkerer. Building things at the edge of dark mode."
  github: "alabrawi619"

# --- Build ---
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: "highlight"

permalink: /:year/:month/:day/:title/

# --- Plugins ---
plugins:
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-optional-front-matter

optional_front_matter:
  remove_originals: true

# --- Sass ---
sass:
  style: compressed
  sass_dir: _sass

# --- Collections defaults ---
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: "blogs"
    values:
      layout: "blog-doc"

# --- Exclude from build ---
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor/
  - .bundle/
  - node_modules/
